name: Distro Support Checks

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n setup_xdp.sh

      - name: Python syntax check
        run: python3 -m py_compile xdp_port_sync.py

      - name: Shell syntax check for bxdp
        run: bash -n bxdp

  distro-check:
    needs: syntax
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian
            image: debian:12-slim
            install: apt-get update && apt-get install -y bash curl git ca-certificates iproute2
          - name: ubuntu
            image: ubuntu:24.04
            install: apt-get update && apt-get install -y bash curl git ca-certificates iproute2
          - name: fedora
            image: fedora:41
            install: dnf -y install bash curl git ca-certificates iproute
          - name: opensuse
            image: opensuse/leap:15.6
            install: zypper --non-interactive refresh && zypper --non-interactive install -y bash curl git ca-certificates iproute2
          - name: arch
            image: archlinux:latest
            install: pacman -Sy --noconfirm --needed bash curl git ca-certificates iproute2
          - name: alpine
            image: alpine:3.20
            install: apk add --no-cache bash curl git ca-certificates iproute2
          - name: almalinux
            image: almalinux:10
            install: dnf -y install bash curl git ca-certificates iproute
          - name: rockylinux
            image: rockylinux:9
            install: dnf -y --allowerasing install bash curl git ca-certificates iproute
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install runtime dependencies
        run: ${{ matrix.install }}

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run dry-run smoke test
        run: |
          bash ./setup_xdp.sh --dry-run | tee /tmp/setup_xdp_dry_run.log
          grep -q '^mode=dry-run$' /tmp/setup_xdp_dry_run.log
          grep -q '^package_manager=' /tmp/setup_xdp_dry_run.log
          grep -q '^init_system=' /tmp/setup_xdp_dry_run.log
          grep -q '^planned_packages=' /tmp/setup_xdp_dry_run.log

      - name: Validate installer help text
        run: bash ./setup_xdp.sh --help >/dev/null
